---
layout: default
---

<article>
  <header class="post-header">
    <div class="container">
      <h1>{{ page.title }}</h1>
      <p class="post-meta">
        {{ page.date | date: "%B %d, %Y" }}
        {% if page.author %} &middot; {{ page.author }}{% endif %}
      </p>
    </div>
  </header>

  <div class="post-content page-content">
    <div class="container">
      {{ content }}
    </div>
  </div>
</article>
