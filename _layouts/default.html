<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
</head>
<body>
  <div class="site-wrapper">
    <nav class="site-nav">
      <div class="nav-inner">
        <a href="{{ '/' | relative_url }}" class="nav-logo">{{ site.author }}</a>
        <ul class="nav-links">
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/blog' | relative_url }}">Blog</a></li>
          <li><a href="{{ '/about' | relative_url }}">About</a></li>
          <li><a href="{{ '/projects' | relative_url }}">Projects</a></li>
          <li><a href="{{ '/cv' | relative_url }}">CV</a></li>
          <li><a href="{{ '/research' | relative_url }}">Research</a></li>
        </ul>
      </div>
    </nav>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-inner">
          <span>&copy; {{ 'now' | date: "%Y" }} {{ site.author }}</span>
          <ul class="footer-links">
            <li><a href="https://www.linkedin.com/in/danahagist/" target="_blank">LinkedIn</a></li>
            <li><a href="https://github.com/danahagist" target="_blank">GitHub</a></li>
          </ul>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
